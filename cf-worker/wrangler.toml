name = "cli-proxy-api-plus-cf"
main = "index.ts"
compatibility_date = "2024-03-08"

# KV Namespaces for storing tokens and configuration
kv_namespaces = [
  { binding = "TOKENS", id = "d648f81f07c14adb9cdc01105ad2915f" },
  { binding = "CONFIG", id = "cf69040b9c364799b5a24fd43b53f400" }
]

[vars]
# Environment variables for OAuth
KIRO_CLIENT_ID = "your_aws_client_id"
# Add your ADMIN_PASSWORD as a secret:
# npx wrangler secret put ADMIN_PASSWORD
